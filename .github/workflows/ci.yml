name: CI

# Runs the full validation gate on every pull request and on pushes to main.
# This is the check branch protection should require, so unformatted,
# lint-erroring, or type-broken code can never merge to main again.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Python (Hermes plugin tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Verify manifest version sync
        run: bun run sync-version:check

      - name: Hardcoded path hygiene (report-only)
        run: bun run check:paths

      - name: Formatting check
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: TypeScript test suite
        run: bun test

      - name: Python plugin tests
        run: python -m unittest discover -s tests/python -v

      - name: Python package compiles
        run: python -m compileall -q plugins/hermes
